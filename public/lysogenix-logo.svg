<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="1200" height="800" fill="#1a1a1a"/>
  
  <!-- Atomic symbol -->
  <g transform="translate(240, 400)">
    <!-- Center circle -->
    <circle cx="0" cy="0" r="20" fill="none" stroke="white" stroke-width="3"/>
    <circle cx="0" cy="0" r="4" fill="white"/>
    
    <!-- Orbits -->
    <ellipse cx="0" cy="0" rx="80" ry="50" fill="none" stroke="white" stroke-width="2.5"/>
    <ellipse cx="0" cy="0" rx="80" ry="50" fill="none" stroke="white" stroke-width="2.5" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="80" ry="50" fill="none" stroke="white" stroke-width="2.5" transform="rotate(120)"/>
    
    <!-- Electrons -->
    <circle cx="80" cy="0" r="6" fill="white"/>
    <circle cx="-40" cy="70" r="6" fill="white"/>
    <circle cx="-40" cy="-70" r="6" fill="white"/>
  </g>
  
  <!-- Divider line -->
  <line x1="420" y1="200" x2="420" y2="600" stroke="white" stroke-width="2"/>
  
  <!-- Main text -->
  <text x="550" y="480" font-family="Arial, sans-serif" font-size="120" font-weight="bold" fill="white" letter-spacing="2">LysoGenix</text>
  
  <!-- Subtext -->
  <text x="550" y="580" font-family="Arial, sans-serif" font-size="40" fill="white" letter-spacing="6">BIOACTIVES</text>
  
  <!-- Bottom text -->
  <text x="600" y="720" font-family="Arial, sans-serif" font-size="32" fill="white" letter-spacing="4">ESTD 2026</text>
</svg>
